<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - ShopCore</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-body-secondary d-flex flex-column min-vh-100">
    
    <main class="container my-5 flex-grow-1">
        
        <nav class="mb-4" aria-label="Secondary navigation">
            <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm" aria-label="Go back to the homepage">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </nav>

        <div id="accountContainer" class="row gx-5 d-none">
            
            <aside class="col-md-4 mb-4" aria-label="User Profile Details">
                <div class="card p-4 shadow-sm border-0 h-100 d-flex flex-column bg-body-tertiary" style="border-radius: 12px;">
                    <h2 class="h4 mb-4 pb-2 border-bottom"><i class="bi bi-person-badge text-primary me-2"></i> My Profile</h2>
                    
                    <dl class="mb-0">
                        <div class="mb-3">
                            <dt class="text-muted text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Full Name</dt>
                            <dd id="profileName" class="fs-5 mb-0 fw-medium"></dd>
                        </div>
                        
                        <div class="mb-3">
                            <dt class="text-muted text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Email Address</dt>
                            <dd id="profileEmail" class="mb-0"></dd>
                        </div>
                        
                        <div class="mb-4">
                            <dt class="text-muted text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 0.5px;">Phone Number</dt>
                            <dd id="profilePhone" class="mb-0"></dd>
                        </div>
                    </dl>

                    <div class="mt-auto pt-4 border-top">
                        <button class="btn btn-outline-primary w-100 mb-2 shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#editProfileModal" aria-label="Edit Profile Information">
                            <i class="bi bi-pencil-square me-1"></i> Edit Info
                        </button>
                        
                        <button class="btn btn-outline-danger w-100 shadow-sm fw-bold" id="btnLogout" aria-label="Log out of your account">
                            <i class="bi bi-box-arrow-right me-1"></i> Log Out
                        </button>
                    </div>
                </div>
            </aside>

            <section class="col-md-8" aria-label="Order History">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0"><i class="bi bi-clock-history text-primary me-2"></i> Order History</h2>
                    <button class="btn btn-sm btn-outline-danger shadow-sm" id="btnClearHistory" aria-label="Clear all order history">
                        <i class="bi bi-trash3 me-1"></i> Clear History
                    </button>
                </div>
                
                <div id="emptyHistoryState" class="p-5 bg-body-tertiary rounded text-center shadow-sm border-0 d-none" aria-live="polite">
                    <i class="bi bi-receipt text-muted" style="font-size: 2.5rem;" aria-hidden="true"></i>
                    <p class="text-muted mt-3 mb-0 fs-5">You have no order history yet.</p>
                </div>
                
                <div id="orderList" class="order-list"></div>
            </section>
        </div>
    </main>

    <template id="orderCardTemplate">
        <article class="card mb-4 p-4 shadow-sm border-0 bg-body-tertiary" style="border-radius: 12px;">
            <header class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-3">
                <div>
                    <h3 class="h6 mb-1 fw-bold text-uppercase order-id-text" style="letter-spacing: 0.5px;"></h3>
                    <small class="text-muted order-date-text"></small>
                </div>
                <strong class="text-primary fs-5 order-total-text"></strong>
            </header>
            
            <ul class="list-unstyled mb-0 order-items-list" aria-label="Items in this order">
                </ul>
            
            <footer class="mt-3 pt-3 border-top text-end">
                 <a href="#" class="btn btn-sm btn-outline-secondary order-receipt-btn px-3 shadow-sm">
                     <i class="bi bi-file-earmark-text me-1"></i> View Receipt
                </a>
            </footer>
        </article>
    </template>

    <template id="orderItemTemplate">
        <li class="d-flex align-items-center mb-3">
            <img class="item-img me-3 border rounded p-1 bg-body" src="" alt="Product thumbnail" style="width: 45px; height: 45px; object-fit: contain;">
            <span class="text-muted fw-bold me-3 item-qty" style="font-size: 0.9rem; min-width: 25px;"></span>
            <span class="text-truncate text-body item-title fw-medium" style="max-width: 300px; font-size: 0.95rem;"></span>
        </li>
    </template>

    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg bg-body">
                <header class="modal-header bg-body-tertiary border-bottom-0">
                    <h2 class="modal-title h5 fw-bold" id="editProfileModalLabel"><i class="bi bi-pencil-square text-primary me-2"></i> Edit Profile</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel editing"></button>
                </header>
                
                <div class="modal-body p-4">
                    <form id="editProfileForm">
                        <div class="mb-3">
                            <label for="editName" class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Full Name</label>
                            <input type="text" class="form-control bg-body-secondary border-0 py-2" id="editName" autocomplete="name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="editPhone" class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Phone Number</label>
                            <input type="tel" class="form-control bg-body-secondary border-0 py-2" id="editPhone" autocomplete="tel" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="editEmail" class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Email Address</label>
                            <input type="email" class="form-control bg-body-secondary border-0 py-2" id="editEmail" autocomplete="email" required>
                            <div class="form-text small text-warning mt-2">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i> Changing your email will update your login credentials.
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2 border-top pt-4 mt-2">
                            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/account.js"></script>
</body>
</html>
