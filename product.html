<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Product Details - ShopCore</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    
    <main class="container my-5 flex-grow-1">
        
        <div class="mb-4">
            <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3 shadow-sm" aria-label="Go back to the homepage">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>

        <div id="loadingState" class="text-center py-5" aria-live="polite">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading product details...</span>
            </div>
        </div>
        
        <div id="errorState" class="text-center py-5 d-none" aria-live="assertive">
            <i class="bi bi-exclamation-octagon text-danger display-1 mb-3"></i>
            <h2 class="text-danger">Product Not Found</h2>
            <p class="text-muted">The item you are looking for might have been removed or is temporarily unavailable.</p>
        </div>

        <article id="productContent" class="row align-items-center d-none">
            
            <div class="col-md-6 text-center mb-4 mb-md-0">
                <img id="prodImage" src="" class="img-fluid bg-body-tertiary p-4 shadow-sm rounded" style="max-height: 450px; object-fit: contain;" alt="Product Image">
            </div>
            
            <div class="col-md-6 px-md-4">
                <span id="prodCategory" class="badge bg-secondary mb-2 text-uppercase" style="letter-spacing: 1px;"></span>
                
                <h1 id="prodTitle" class="display-6 fw-bold lh-sm mb-3"></h1>
                <h2 id="prodPrice" class="text-primary fw-bold mb-4"></h2>
                
                <p id="prodDesc" class="lead text-muted" style="font-size: 1.1rem; line-height: 1.6;"></p>
                
                <div class="d-flex flex-column flex-sm-row mt-5 gap-3">
                    <button id="btnAddToCart" class="btn btn-outline-primary btn-lg flex-grow-1 shadow-sm fw-bold">
                        <i class="bi bi-cart-plus me-2"></i> Add to Cart
                    </button>
                    <button id="btnBuyNow" class="btn btn-primary btn-lg flex-grow-1 shadow-sm fw-bold">
                        <i class="bi bi-lightning-fill text-warning me-2"></i> Buy Now
                    </button>
                </div>
            </div>
        </article>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/product.js"></script>
</body>
</html>
