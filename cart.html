<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopCore</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-body-secondary d-flex flex-column min-vh-100">
    
    <main class="container my-5 flex-grow-1">
        
        <header class="mb-4">
            <h1 class="fw-bold h2"><span class="fw-bold" style="color: #0dcaf0;">Shopping</span> <span class="text-warning fw-bold">Bag</span></h1>
            <p id="cartItemCount" class="text-muted" aria-live="polite">Loading your curation...</p>
        </header>
        
        <section id="emptyCartState" class="text-center p-5 bg-body-tertiary rounded shadow-sm border-0 d-none mt-4">
            <i class="bi bi-bag-x text-muted" style="font-size: 3rem;" aria-hidden="true"></i>
            <h2 class="h4 text-muted mt-3">Your shopping bag is currently empty</h2>
            <a href="index.html" class="btn btn-outline-secondary mt-3 px-4 py-2 text-uppercase fw-bold" style="letter-spacing: 1px;">
                Discover Products
            </a>
        </section>

        <div id="populatedCartState" class="row gx-5 mt-4 d-none">
            
            <section class="col-lg-8" aria-label="Cart Items">
                <div id="fullCartContainer"></div>
            </section>
            
            <aside class="col-lg-4" aria-label="Order Summary">
                <div class="card p-4 shadow-sm border-0 bg-body-tertiary sticky-top" style="border-radius: 8px; top: 100px; z-index: 1;">
                    <h2 class="h5 mb-4 fw-normal">Order Summary</h2>
                    
                    <div class="d-flex justify-content-between mb-3 text-muted" style="font-size: 0.9rem;">
                        <span>Subtotal</span>
                        <span id="summarySubtotal" class="text-body fw-medium">₹0.00</span> 
                    </div>
                    
                    <div class="d-flex justify-content-between mb-3 text-muted" style="font-size: 0.9rem;">
                        <span>Shipping</span>
                        <span class="text-body">Calculated at checkout</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4 text-muted" style="font-size: 0.9rem;">
                        <span>Tax</span>
                        <span class="text-body">₹0.00</span> 
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4 border-top pt-4">
                        <span class="fw-bold">Total</span>
                        <h3 class="h4 mb-0 fw-bold" id="fullCartTotal" aria-live="polite">₹0.00</h3> 
                    </div>
                    
                    <button class="btn btn-primary w-100 py-3 text-uppercase fw-bold shadow-sm" id="btnCheckoutFull" style="letter-spacing: 1px;">
                        Proceed to Checkout
                    </button>
                </div>
            </aside>
        </div>
        
        <nav class="mt-5" aria-label="Secondary navigation">
            <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm">
                <i class="bi bi-arrow-left me-1"></i> Continue Shopping
            </a>
        </nav>
    </main>

    <template id="fullCartItemTemplate">
        <article class="card mb-4 p-3 shadow-sm border-0 position-relative bg-body-tertiary" style="border-radius: 8px;">
            
            <button type="button" class="btn-close position-absolute top-0 end-0 m-3 btn-remove" aria-label="Remove item from cart" style="font-size: 0.65rem;"></button>
            
            <div class="d-flex flex-column flex-sm-row align-items-center align-items-sm-start">
                
                <div class="me-sm-4 mb-3 mb-sm-0 bg-body-secondary rounded p-2 d-flex align-items-center justify-content-center border flex-shrink-0" style="width: 120px; height: 120px;">
                    <img class="cart-item-img" src="" alt="Product" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
                
                <div class="d-flex flex-column justify-content-between flex-grow-1 w-100 h-100 py-1">
                    
                    <div class="pe-4 text-center text-sm-start">
                        <p class="text-muted text-uppercase mb-1" style="font-size: 0.65rem; letter-spacing: 1px; font-weight: 600;">ShopCore Collection</p>
                        <h3 class="h6 mb-1 cart-item-title fw-bold text-body" style="display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;"></h3>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-end mt-3 w-100">
                        
                        <div class="d-flex align-items-center border rounded p-1">
                            <button class="btn btn-sm bg-body border-0 px-2 py-0 btn-minus" aria-label="Decrease quantity"><i class="bi bi-dash" aria-hidden="true"></i></button>
                            <span class="mx-3 fw-bold cart-item-qty text-body" style="font-size: 0.9rem;" aria-live="polite"></span>
                            <button class="btn btn-sm bg-body border-0 px-2 py-0 btn-plus" aria-label="Increase quantity"><i class="bi bi-plus" aria-hidden="true"></i></button>
                        </div>
                        
                        <span class="fw-bold cart-item-price fs-6 text-body"></span>
                    </div>
                </div>
            </div>
        </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/cart.js"></script>
</body>
</html>
