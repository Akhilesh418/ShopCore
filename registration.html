<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Register - ShopCore</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-body d-flex align-items-center justify-content-center min-vh-100 py-4">
    
    <div class="position-absolute top-0 end-0 p-4">
        <button class="btn btn-link text-body text-decoration-none border-0" id="themeToggle" aria-label="Toggle Dark Mode" title="Toggle Dark Mode">
            <i class="bi bi-moon-stars-fill fs-4" id="themeIcon"></i>
        </button>
    </div>
    
    <main class="container w-100">
        <div class="row justify-content-center">
            <div class="col-11 col-md-8 col-lg-6">
                
                <div class="card p-4 p-md-5 shadow-lg border-0 bg-body-tertiary" style="border-radius: 16px;">
                    
                    <header class="text-center mb-4 pb-2 border-bottom">
                        <a href="index.html" class="text-decoration-none display-6" style="letter-spacing: -0.5px;" aria-label="ShopCore Home">
                            <span class="fw-bold" style="color: #0dcaf0;">Shop</span><span class="text-warning fw-bold">Core</span>
                        </a>
                        <p class="text-muted mt-2 mb-3">Join the Core. Create your account.</p>
                    </header>
                    
                    <form id="registerForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="regName" class="form-label text-uppercase fw-bold text-muted small" style="letter-spacing: 1px;">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body-secondary border-end-0" aria-hidden="true"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control py-2 border-start-0 ps-0" id="regName" placeholder="John Doe" autocomplete="name" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="regPhone" class="form-label text-uppercase fw-bold text-muted small" style="letter-spacing: 1px;">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body-secondary border-end-0" aria-hidden="true"><i class="bi bi-telephone text-muted"></i></span>
                                    <input type="tel" class="form-control py-2 border-start-0 ps-0" id="regPhone" placeholder="(555) 000-0000" autocomplete="tel" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="regEmail" class="form-label text-uppercase fw-bold text-muted small" style="letter-spacing: 1px;">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-secondary border-end-0" aria-hidden="true"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control py-2 border-start-0 ps-0" id="regEmail" placeholder="name@example.com" autocomplete="email" required>
                            </div>
                        </div>
                        
                        <div class="mb-4 mt-2">
                            <label for="regPassword" class="form-label text-uppercase fw-bold text-muted small" style="letter-spacing: 1px;">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-body-secondary border-end-0" aria-hidden="true"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control py-2 border-start-0 ps-0" id="regPassword" placeholder="Create a secure password" autocomplete="new-password" required minlength="8">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-3 text-uppercase fw-bold shadow-sm" style="letter-spacing: 1px;">
                            Create Account
                        </button>
                    </form>
                    
                    <footer class="text-center mt-4 mb-0 text-muted">
                        Already have an account? <a href="login.html" class="fw-bold text-decoration-none" style="color: #0dcaf0;">Log In</a>
                    </footer>
                </div>
                
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="./src/registration.js" defer></script>
</body>
</html>
